<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 영상 요약기</title>
    <style>
        body { 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
        }
        h1 { 
            color: #2c3e50; 
            font-size: 26px; 
            margin-bottom: 10px; 
        }
        p {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 15px;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        button { 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            width: 100%; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.3s; 
        }
        button:hover { 
            background-color: #2980b9; 
        }
        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 8px; 
            background-color: #f8f9fa; 
            border: 1px solid #e9ecef; 
            text-align: left; 
            min-height: 100px; 
            display: none; 
            line-height: 1.6;
            color: #34495e;
        }
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #3498db; 
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            animation: spin 1s linear infinite; 
            margin: 30px auto; 
            display: none; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>유튜브 영상 요약기 📺</h1>
        <p>바빠서 다 못 보는 영상, 링크만 넣고 핵심을 확인하세요.</p>
        
        <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button onclick="summarizeVideo()">3줄 요약하기</button>
        
        <div class="loader" id="loader"></div>
        
        <div class="result-box" id="resultBox">
            <h3 style="margin-top: 0; color: #2c3e50;">💡 요약 결과</h3>
            <div id="summaryText"></div>
        </div>
    </div>

    <script>
        async function summarizeVideo() {
            const urlInput = document.getElementById('youtubeUrl').value;
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const summaryText = document.getElementById('summaryText');

            if (!urlInput.includes('youtube.com') && !urlInput.includes('youtu.be')) {
                alert('올바른 유튜브 링크를 입력해주세요!');
                return;
            }

            // UI 업데이트: 결과창 숨기고 로딩 표시 시작
            loader.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ videoUrl: urlInput }),
                });

                const data = await response.json();

                if (response.ok) {
                    summaryText.innerText = data.summary;
                } else {
                    summaryText.innerText = `요약 실패: ${data.error}`;
                }

            } catch (error) {
                summaryText.innerText = `오류 발생: ${error.message}`;
            } finally {
                loader.style.display = 'none';
                resultBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
