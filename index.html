<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator {
            border: 2px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        .calculator-screen {
            width: 100%;
            height: 60px;
            border: none;
            background-color: #222;
            color: #fff;
            text-align: right;
            padding: 10px;
            font-size: 2em;
            box-sizing: border-box;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .calculator-keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
        }
        .key {
            height: 60px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            font-size: 1.5em;
            cursor: pointer;
        }
        .key:hover {
            background-color: #eaeaea;
        }
        .operator {
            background-color: #f2a23c;
            color: #fff;
        }
        .operator:hover {
            background-color: #d99136;
        }
        .equal-sign {
            background-color: #4CAF50;
            color: #fff;
            grid-column: span 2;
        }
        .equal-sign:hover {
            background-color: #45a049;
        }
        .all-clear {
            background-color: #f44336;
            color: #fff;
        }
        .all-clear:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="calculator-screen" value="" disabled />
        <div class="calculator-keys">
            <button type="button" class="key all-clear" value="all-clear">AC</button>
            <button type="button" class="key operator" value="/">&divide;</button>
            <button type="button" class="key operator" value="*">&times;</button>

            <button type="button" class="key" value="7">7</button>
            <button type="button" class="key" value="8">8</button>
            <button type="button" class="key" value="9">9</button>
            <button type="button" class="key operator" value="-">-</button>

            <button type="button" class="key" value="4">4</button>
            <button type="button" class="key" value="5">5</button>
            <button type="button" class="key" value="6">6</button>
            <button type="button" class="key operator" value="+">+</button>

            <button type="button" class="key" value="1">1</button>
            <button type="button" class="key" value="2">2</button>
            <button type="button" class="key" value="3">3</button>

            <button type="button" class="key equal-sign" value="=">=</button>
            <button type="button" class="key" value="0">0</button>
            <button type="button" class="key" value=".">.</button>
        </div>
    </div>

    <script>
        const calculator = document.querySelector('.calculator');
        const keys = calculator.querySelector('.calculator-keys');
        const screen = calculator.querySelector('.calculator-screen');

        keys.addEventListener('click', e => {
            if (e.target.matches('button')) {
                const key = e.target;
                const action = key.value;
                const keyContent = key.textContent;
                const displayedNum = screen.value;

                if (!action) {
                    if (displayedNum === '0') {
                        screen.value = keyContent;
                    } else {
                        screen.value = displayedNum + keyContent;
                    }
                }

                if (
                    action === 'add' ||
                    action === 'subtract' ||
                    action === 'multiply' ||
                    action === 'divide'
                ) {
                    screen.value = displayedNum + keyContent;
                }
                
                if (action >= '0' && action <= '9' || action === '.') {
                    if (displayedNum === '0' && action !== '.') {
                       screen.value = action;
                    } else {
                       screen.value += action;
                    }
                }

                if (action === 'all-clear') {
                    screen.value = '';
                }

                if (action === '=') {
                    try {
                        screen.value = eval(displayedNum.replace(/×/g, '*').replace(/÷/g, '/'));
                    } catch (error) {
                        screen.value = 'Error';
                    }
                }
            }
        });
    </script>

</body>
</html>
